name: CI

on:
  push:
    branches: [main]
  pull_request:
  # The merge queue builds speculative merge refs; required checks must
  # report on those refs or queued PRs never merge.
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never cancel runs on main: a fast follow-up merge would otherwise leave
  # the earlier merge commit without a CI result.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # A bare `rustup toolchain install` reads rust-toolchain.toml (version
      # AND components). Deliberately not a toolchain action: those export
      # RUSTUP_TOOLCHAIN, which overrides the pin in rust-toolchain.toml.
      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: rustup toolchain install

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Docs are as honest as the code
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  msrv:
    name: Build on MSRV (1.80)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      # The action exports RUSTUP_TOOLCHAIN=1.80.0, which overrides the
      # rust-toolchain.toml pin — exactly what this job needs.
      - uses: dtolnay/rust-toolchain@02615d347998f2a395863137815cac5be587e500 # 1.80.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Verify the crate builds on its declared minimum Rust version
        run: cargo check --all-targets
