name: PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check the PR title against the commit convention
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$TITLE" > .pr-title.txt
          bash bin/lint-commit-message.sh .pr-title.txt
