name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # mint the short-lived crates.io token via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # A bare `rustup toolchain install` reads rust-toolchain.toml (version
      # AND components). Deliberately not a toolchain action: those export
      # RUSTUP_TOOLCHAIN, which overrides the pin in rust-toolchain.toml.
      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: rustup toolchain install

      - name: Check the tag matches the crate version
        run: |
          crate_version="$(cargo pkgid | sed 's/.*[#@]//')"
          if [ "${GITHUB_REF_NAME#v}" != "$crate_version" ]; then
            echo "✗ Tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version" >&2
            exit 1
          fi

      - name: Verify before publishing
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      # Trusted Publishing: exchanges this workflow's OIDC identity for a
      # short-lived crates.io token — no long-lived CARGO_REGISTRY_TOKEN
      # secret to store or leak. One-time setup on crates.io: the sooth
      # crate -> Settings -> Trusted Publishing -> add this repository and
      # workflow file (release.yml).
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
