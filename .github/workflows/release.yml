name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify before publishing
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      # Requires a CARGO_REGISTRY_TOKEN secret on this repository: a scoped,
      # short-lived crates.io API token (Account Settings -> API Tokens on
      # crates.io) added under Settings -> Secrets and variables -> Actions.
      # Never paste this token into a terminal/session — CI-only.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
